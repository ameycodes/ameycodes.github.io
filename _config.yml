title: AMEY x ORBITAL OPS
description: Engineering notes transmitted from orbit — backend, DevOps, and AI agents.
url: https://ameycodes.github.io
baseurl: ""
timezone: Asia/Kolkata
future: true
author:
  name: Amey
plugins:
  - jekyll-feed
  - jekyll-sitemap
feed:
  path: feed.xml
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/
kramdown:
  input: GFM
  syntax_highlighter: rouge
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: transmission
exclude:
  - README.md
